<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coaler1 — Showcase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #06060c; --bg-card: rgba(14,14,26,0.65); --bg-card-hover: rgba(22,22,44,0.85);
            --accent: #6c5ce7; --teal: #00cec9; --pink: #fd79a8; --gold: #fdcb6e;
            --green: #55efc4; --lilac: #a29bfe;
            --grad-main: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --glow: rgba(108,92,231,0.3);
            --text: #eaeaf5; --text2: #8888a8; --text3: #505068;
            --brd: rgba(255,255,255,0.06); --brd-h: rgba(108,92,231,0.4);
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        .bg-grid { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(108,92,231,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(108,92,231,0.035) 1px, transparent 1px); background-size: 80px 80px; mask-image: radial-gradient(ellipse 80% 50% at 50% 0%, black 20%, transparent 100%); }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
        .bg-orb-1 { top: -120px; left: 20%; width: 500px; height: 500px; background: rgba(108,92,231,0.15); animation: f1 8s ease-in-out infinite alternate; }
        .bg-orb-2 { top: 100px; right: 10%; width: 400px; height: 400px; background: rgba(0,206,201,0.1); animation: f2 10s ease-in-out infinite alternate; }
        @keyframes f1 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(30px,-20px) scale(1.1)} }
        @keyframes f2 { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(-20px,30px) scale(1.05)} }

        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; background: rgba(6,6,12,0.8); backdrop-filter: blur(24px); border-bottom: 1px solid var(--brd); }
        .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.15rem; color: var(--text); text-decoration: none; }
        .nav-brand img { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--accent); }
        .nav-brand span { background: var(--grad-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--teal); text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: opacity 0.3s; }
        .back-link:hover { opacity: 0.7; }

        main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

        .page-header { text-align: center; padding-top: 120px; padding-bottom: 20px; animation: fadeUp 0.6s ease-out; }
        .page-header h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
        .gt { background: var(--grad-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .page-header p { color: var(--text2); font-size: 1rem; }

        .divider { height: 1px; margin: 2.5rem 0; background: linear-gradient(to right, transparent, var(--brd), transparent); }

        .c-purple { color: var(--lilac); }
        .c-teal { color: var(--teal); }
        .c-pink { color: var(--pink); }
        .c-gold { color: var(--gold); }
        .c-green { color: var(--green); }

        /* SHOWCASE CARDS */
        .showcase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 2rem; padding-bottom: 60px; }
        .showcase-card { background: var(--bg-card); border: 1px solid var(--brd); border-radius: 20px; overflow: hidden; transition: all 0.4s; animation: fadeUp 0.6s ease-out both; }
        .showcase-card:nth-child(2) { animation-delay: 0.15s; }
        .showcase-card:hover { transform: translateY(-6px); border-color: var(--brd-h); box-shadow: 0 20px 60px rgba(108,92,231,0.12); }

        .video-wrap { aspect-ratio: 16/9; width: 100%; overflow: hidden; border-bottom: 1px solid var(--brd); }
        .video-wrap iframe { width: 100%; height: 100%; border: none; }

        .showcase-body { padding: 1.5rem 1.8rem 1.8rem; }
        .showcase-tag { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.8rem; }
        .showcase-tag.purple { background: rgba(108,92,231,0.15); color: var(--lilac); border: 1px solid rgba(108,92,231,0.25); }
        .showcase-tag.teal { background: rgba(0,206,201,0.12); color: var(--teal); border: 1px solid rgba(0,206,201,0.2); }
        .showcase-body h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.5rem; }
        .showcase-body .desc { font-size: 0.85rem; color: var(--text2); line-height: 1.6; margin-bottom: 1.2rem; }

        .showcase-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; }
        .showcase-stat { text-align: center; padding: 0.7rem 0.5rem; background: rgba(255,255,255,0.025); border-radius: 10px; border: 1px solid var(--brd); }
        .showcase-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 800; }
        .showcase-stat-lbl { font-size: 0.6rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

        .contrib-section { margin-top: 1.2rem; padding-top: 1.2rem; border-top: 1px solid var(--brd); }
        .contrib-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); font-weight: 700; margin-bottom: 0.6rem; }
        .contrib-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .contrib-tag { padding: 4px 10px; background: rgba(108,92,231,0.08); border: 1px solid rgba(108,92,231,0.15); border-radius: 6px; font-size: 0.7rem; color: var(--text2); font-weight: 500; }

        /* SKELETON */
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; animation: blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        footer { text-align: center; padding: 3rem 0; border-top: 1px solid var(--brd); }
        footer p { font-size: 0.72rem; color: var(--text3); }
        footer a { color: var(--teal); text-decoration: none; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

        @media (max-width: 768px) {
            .showcase-grid { grid-template-columns: 1fr; }
            .page-header h1 { font-size: 2rem; }
            .showcase-stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <nav>
        <a class="nav-brand" href="index.html"><img src="https://github.com/Coaler1.png" alt="Coaler1"><span>Coaler1</span></a>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Profile</a>
    </nav>

    <main>
        <div class="page-header">
            <h1>Past Work <span class="gt">Showcase</span></h1>
            <p>Detailed breakdowns with live Roblox stats and video walkthroughs.</p>
        </div>
        <div class="divider"></div>
        <div class="showcase-grid" id="showcase-container">
            <!-- skeleton cards -->
            <div class="showcase-card" style="pointer-events:none"><div class="video-wrap skeleton" style="aspect-ratio:16/9"></div><div class="showcase-body"><div class="skeleton" style="width:80px;height:16px;margin-bottom:10px"></div><div class="skeleton" style="width:220px;height:22px;margin-bottom:14px"></div><div class="skeleton" style="width:100%;height:10px;margin-bottom:6px"></div><div class="skeleton" style="width:90%;height:10px;margin-bottom:18px"></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px"><div class="skeleton" style="height:55px;border-radius:10px"></div><div class="skeleton" style="height:55px;border-radius:10px"></div><div class="skeleton" style="height:55px;border-radius:10px"></div><div class="skeleton" style="height:55px;border-radius:10px"></div></div></div></div>
            <div class="showcase-card" style="pointer-events:none"><div class="video-wrap skeleton" style="aspect-ratio:16/9"></div><div class="showcase-body"><div class="skeleton" style="width:80px;height:16px;margin-bottom:10px"></div><div class="skeleton" style="width:220px;height:22px;margin-bottom:14px"></div><div class="skeleton" style="width:100%;height:10px;margin-bottom:6px"></div><div class="skeleton" style="width:90%;height:10px;margin-bottom:18px"></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px"><div class="skeleton" style="height:55px;border-radius:10px"></div><div class="skeleton" style="height:55px;border-radius:10px"></div><div class="skeleton" style="height:55px;border-radius:10px"></div><div class="skeleton" style="height:55px;border-radius:10px"></div></div></div></div>
        </div>
    </main>

    <footer><p>&copy; 2024 <a href="index.html">Coaler1</a> &middot; Showcase</p></footer>

    <script>
    /*
     * Same config as index.html — add your Universe/Place IDs here too.
     * contributions: array of tags shown under "My Contributions"
     */
    const GAMES = [
        {
            universeId: "DEINE_UNIVERSE_ID_1",
            placeId:    "DEINE_PLACE_ID_1",
            tag: "Template · Simulator",
            tagColor: "purple",
            description: "Custom scripted template inspired by \"Poison Treats\" — featuring a full gameplay loop with pet system, shop mechanics, UI animations, and reliable datastores.",
            videoId: "o0llXai63nU",
            contributions: ["Gameplay Loop", "Pet System", "Shop & Economy", "Datastores", "UI Logic"]
        },
        {
            universeId: "DEINE_UNIVERSE_ID_2",
            placeId:    "DEINE_PLACE_ID_2",
            tag: "Template · Tycoon",
            tagColor: "teal",
            description: "Custom scripted template inspired by \"Build a Scam Empire\" — with a rebirth system, progression tiers, shop integration, and scalable server architecture.",
            videoId: "R2Rgj9Bdnpc",
            contributions: ["Rebirth System", "Economy & Shop", "Server Architecture", "Datastores", "Progression Logic"]
        }
    ];

    const PROXIES = [
        url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
        url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    ];

    async function proxyFetch(url) {
        for (const mk of PROXIES) { try { const r = await fetch(mk(url), {signal: AbortSignal.timeout(8000)}); if(r.ok) return JSON.parse(await r.text()); } catch{} }
        return null;
    }

    function fmt(n) {
        if(n==null) return '—';
        if(n>=1e6) return (n/1e6).toFixed(1).replace('.0','')+'M';
        if(n>=1e3) return (n/1e3).toFixed(1).replace('.0','')+'K';
        return n.toLocaleString();
    }

    function showcaseCard(g, d) {
        const v=d?.visits??0, p=d?.playing??0, f=d?.favoritedCount??0;
        const name = d?.name ?? 'Loading…';
        const up=d?.totalUpVotes??0, dn=d?.totalDownVotes??0;
        const rat = (up+dn)>0 ? Math.round(up/(up+dn)*100)+'%' : '—';
        const contribs = (g.contributions||[]).map(c => `<span class="contrib-tag">${c}</span>`).join('');

        return `
        <div class="showcase-card">
            <div class="video-wrap">
                <iframe src="https://www.youtube.com/embed/${g.videoId}" title="${name}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="showcase-body">
                <span class="showcase-tag ${g.tagColor}">${g.tag}</span>
                <h3>${name}</h3>
                <p class="desc">${g.description}</p>
                <div class="showcase-stats">
                    <div class="showcase-stat"><div class="showcase-stat-val c-teal">${fmt(v)}</div><div class="showcase-stat-lbl"><span class="live-dot" style="background:var(--teal)"></span>Visits</div></div>
                    <div class="showcase-stat"><div class="showcase-stat-val c-pink">${fmt(p)}</div><div class="showcase-stat-lbl"><span class="live-dot" style="background:var(--pink)"></span>Playing</div></div>
                    <div class="showcase-stat"><div class="showcase-stat-val c-gold">${fmt(f)}</div><div class="showcase-stat-lbl">Favs</div></div>
                    <div class="showcase-stat"><div class="showcase-stat-val c-purple">${rat}</div><div class="showcase-stat-lbl">Rating</div></div>
                </div>
                <div class="contrib-section">
                    <div class="contrib-label">My Contributions</div>
                    <div class="contrib-tags">${contribs}</div>
                </div>
            </div>
        </div>`;
    }

    async function init() {
        const ids = GAMES.map(g=>g.universeId).join(',');
        const api = await proxyFetch(`https://games.roblox.com/v1/games?universeIds=${ids}`);
        let html = '';
        for (const g of GAMES) {
            const d = api?.data?.find(x=>String(x.id)===g.universeId) || null;
            html += showcaseCard(g, d);
        }
        document.getElementById('showcase-container').innerHTML = html;
    }

    init();
    </script>
</body>
</html>
